<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; }
        #video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div data-shaka-player-container id="video-container">
        <video autoplay id="video" style="width:100%;height:100%"></video>
    </div>

<script>
// कॉन्फ़िगरेशन
const API_URL = "https://sayan-json-3.pages.dev/Data/Channels.json";
const CH_ID = "H1"; // Star Sports 1 Hindi या अन्य ID यहाँ डालें

async function initPlayer() {
    const video = document.getElementById('video');
    const uiContainer = document.getElementById('video-container');
    const player = new shaka.Player(video);
    const ui = new shaka.ui.Overlay(player, uiContainer, video);

    // 1. API से डेटा प्राप्त करना
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        const ch = data.channels.find(c => c.id === CH_ID) || data.channels[0];

        if (!ch) throw new Error("Channel not found");

        // 2. DRM कॉन्फ़िगरेशन
        player.configure({
            drm: {
                clearKeys: {
                    [ch.keyId]: ch.key
                }
            }
        });

        // 3. Network Filters (JioTV सुरक्षा बाईपास करने के लिए)
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            // Headers सेट करें
            request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
            request.headers['Referer'] = 'https://www.jiotv.com/';
            
            if (ch.cookie) {
                request.headers['Cookie'] = ch.cookie;
            }

            // URL में Token जोड़ना
            if (ch.cookie && !request.uris[0].includes('__hdnea__')) {
                const token = ch.cookie.includes('=') ? ch.cookie.split('=')[1] : ch.cookie;
                request.uris[0] += (request.uris[0].includes('?') ? '&' : '?') + '__hdnea__=' + token;
            }
        });

        // 4. स्ट्रीम लोड करना
        await player.load(ch.url);
        console.log("Playing:", ch.name);

    } catch (e) {
        console.error("Error:", e.message);
        alert("स्ट्रीम लोड नहीं हो सकी। कृपया सुनिश्चित करें कि आप इसे लोकल फ़ाइल के बजाय किसी सर्वर (Vercel/GitHub) पर चला रहे हैं।");
    }
}

document.addEventListener('shaka-ui-loaded', initPlayer);
</script>
</body>
</html>
