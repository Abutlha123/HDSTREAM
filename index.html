    async function fetchSmartCookie(url) {
      try {
        const response = await fetch(url, { signal: AbortSignal.timeout(4000) });
        if (!response.ok) return "";
        
        const rawText = await response.text();
        const match = rawText.match(/(__hdnea__=[^"'\s&|,\\]+)/);
        
        if (match) {
            return match[1]; 
        }
        return "";
      } catch (error) {
        return ""; 
      }
    }

    async function fetchConfig() {
      try {
        updateStatus("Fetching Channel Data...", "loading");
        const channelRes = await fetch(CHANNELS_JSON_URL);
        const channelList = await channelRes.json();
        const channelData = channelList.find(c => String(c.id) === String(channelId));
        
        if (!channelData) {
          updateStatus("Error: Channel ID not found!", "error", true);
          return false;
        }

        updateStatus(`Checking Token Source...`, "loading");
        let rawCookies = [];
        for (let url of COOKIE_SOURCE_URLS) {
           let cookie = await fetchSmartCookie(url);
           if (cookie) rawCookies.push(cookie); 
        }

        let collectedCookies = [...new Set(rawCookies)];
        if (collectedCookies.length === 0) collectedCookies.push(""); 
        
        const availableUrls = [channelData.url1, channelData.url2, channelData.url3].filter(Boolean);
        return { streamUrls: availableUrls, keyId: channelData.keyId, key: channelData.key, cookiesList: collectedCookies, activeCookie: "" };
      } catch (error) {
        updateStatus("Critical Error connecting to GitHub JSON!", "error", true);
        return false;
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const STREAM_CONFIG = await fetchConfig();
      if (!STREAM_CONFIG) return;

      shaka.polyfill.installAll();
      const videoEl = document.getElementById('video');
      const container = document.getElementById('player-container');
      
      // Attached to window so the kill switch can access it
      window.player = new shaka.Player(videoEl);
      const ui = new shaka.ui.Overlay(window.player, container, videoEl);

      window.player.configure({
        drm: { clearKeys: { [STREAM_CONFIG.keyId]: STREAM_CONFIG.key } },
      });

      window.player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.jiotv.com/';
        if (STREAM_CONFIG.activeCookie) {
          if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
            request.uris[0] = request.uris[0].split('?')[0] + '?' + STREAM_CONFIG.activeCookie;

      });

      let lastErrorCode = "Unknown";

        STREAM_CONFIG.activeCookie = STREAM_CONFIG.cookiesList[c]; 
        
        for (let i = 0; i < STREAM_CONFIG.streamUrls.length; i++) {
          try {
            updateStatus(`Testing Link ${i + 1}...`, "loading");
            await window.player.load(STREAM_CONFIG.streamUrls[i]);
            videoEl.play();
            streamLoaded = true;
            updateStatus(`Playing Live!`, "success");
            setTimeout(() => { statusEl.classList.remove('show'); }, 2000);
            break;

            lastErrorCode = e.code || "Network Blocked (CORS)";
            console.error(e);
          }
        }
        if (streamLoaded) break; 
      }

      if (!streamLoaded) {
        updateStatus(`Failed. Error Code: ${lastErrorCode}`, "error", true);
      }
    });
