<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willo Cricbuzz - Clean Player</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            background-color: #000;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }

        .video-container {
            width: 100%;
            height: 100vh;
            background-color: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Hiding Spinner */
        .shaka-spinner-container {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="video-container" id="video-container">
        <video 
            id="video" 
            poster="https://i.ibb.co/d0yXW75V/108693714.jpg" 
            autoplay 
            playsinline>
        </video>
    </div>

    <script>
        const streamUrl = "https://a95248280kfaebd-ear-a.akamaihd.net/OTTB/iad-nit/v1/809f5100a204/c6aivottlin/g1yvvlko/o/tro/enc/tu/enc.mpd";
        const clearKeys = {
            "242a0612eb2cf817fa69cd18ee140450": "b8988ac150adb196f043bef3f38b2120"
        };

        async function initPlayer() {
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                console.error('Browser not supported!');
                return;
            }

            const video = document.getElementById('video');
            const container = document.getElementById('video-container');
            
            // Manual Initialization (Cleanest way)
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);

            // Configuration
            player.configure({
                drm: { clearKeys: clearKeys },
                streaming: {
                    lowLatencyMode: true,
                    bufferingGoal: 10,
                    rebufferingGoal: 2
                }
            });

            ui.configure({
                'controlPanelElements': [
                    'play_pause', 'time_and_duration', 'spacer', 
                    'mute', 'volume', 'quality', 'fullscreen'
                ],
                'addBigPlayButton': true
            });

            try {
                await player.load(streamUrl);
            } catch (error) {
                console.error('Error loading stream:', error);
            }
        }

        // Listen for the specific Shaka UI load event
        document.addEventListener('shaka-ui-loaded', initPlayer);
    </script>
</body>
</html>
