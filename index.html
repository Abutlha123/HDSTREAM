<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>HD STREAM - Ultimate Sports TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/controls.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.3/shaka-player.ui.js"></script>
    <style>
        :root { --accent: #e50914; --bg: #0e1a2b; --card: #152a3e; --text: #f0f6fc; --hover: #1f3d5c; }
        html { scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 10px; min-height: 100vh; align-items: center; }
        
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .lock-box { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 280px; }
        .lock-box h2 { margin-bottom: 20px; color: var(--accent); }
        .lock-box input { width: 80%; padding: 12px; border-radius: 8px; border: 2px solid var(--hover); background: #000; color: white; text-align: center; font-size: 1.2rem; letter-spacing: 5px; outline: none; margin-bottom: 15px; }
        .lock-box button { background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }

        #main-content { display: none; width: 100%; max-width: 900px; margin-top: 20px; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .channel-info { margin-top: 15px; padding: 15px; background: var(--card); border-radius: 12px; display: flex; flex-direction: column; gap: 5px; }
        .channel-list { margin-top: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; max-height: 400px; overflow-y: auto; padding: 5px; }
        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .channel-btn { background: var(--card); border: 2px solid transparent; color: var(--text); padding: 15px 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; text-align: center; font-size: 0.95rem; }
        .channel-btn:hover { background: var(--hover); transform: translateY(-2px); }
        .channel-btn.active { border-color: var(--accent); background: var(--hover); }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-box">
        <h2>HD STREAM</h2>
        <input type="password" id="pinInput" placeholder="ENTER PIN" maxlength="4">
        <br>
        <button onclick="checkPin()">UNLOCK</button>
        <p id="error-msg" style="color: #FF6347; font-size: 0.8rem; margin-top: 10px; display: none;">Invalid PIN. Try again.</p>
    </div>
</div>

<div id="main-content">
    <div class="video-container" id="videoContainer">
        <video id="video" autoplay muted playsinline style="width:100%;height:100%"></video>
    </div>
    <div class="channel-info">
        <div style="font-weight: bold; font-size: 1.2rem; color: var(--accent);" id="currentName">Select a Sport Channel</div>
        <div style="font-size: 0.85rem; color: #b0c4de;" id="currentStatus">Status: Ready</div>
    </div>
    <div class="channel-list" id="channelList"></div>
</div>

<script>
    let player;
    let currentChannelIndex = 0;
    const token = "st=1772661640~exp=1772748040~acl=/*~hmac=53dd96ee0e53798fa8fe90e83a64b6431771ddc782112a6493f100a645a61a52";

    const channels = [
        { name: "Star Sports HD 1", uri: "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Star_Sports_HD1_BTS/output/index.mpd", kid: "965dc2ddb1d85138ad787999a7f30ca5", key: "859695076e67fe961836b564db6d689c" },
        { name: "Star Sports HD 1 Hindi", uri: "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd", kid: "400131994b445d8c8817202248760fda", key: "2d56cb6f07a75b9aff165d534ae2bfc4" },
        { name: "Star Sports 1 Tamil", uri: "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Star_Sports_1_Tamil_BTS/output/index.mpd", kid: "d0d750ebd52b5756aa7fb833f61ceece", key: "4ae62a20c030c918aad24193c1dda229" },
        { name: "Star Sports 1", uri: "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Star_Sports_1_BTS/output/index.mpd", kid: "df20894ec30954d3b28097c138f4cfda", key: "ff9b6292b1cddbd11a046029cb314634" },
        { name: "Star Sports 1 Telugu", uri: "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Star_Sports_1_Telugu_BTS/output/index.mpd", kid: "200a6dd89c6b5a48b9991d8ab57fc7d2", key: "1f62834669a97e92ea1f3263274853fc" },
        { name: "Sports18 1 HD", uri: "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Sports18_1_HD_BTS/output/index.mpd", kid: "bd1ea6a1c1fb5dcdb709434e0826bbc0", key: "f57f22cba32739ce7beb1fab3f3d060b" },
        { name: "Sports18 1 SD", uri: "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Sports18_1_SD_BTS/output/index.mpd", kid: "a3ed8dc0e0cb5d238da80ee0a85bd2e1", key: "67a96992e6406606f3480ab58d7f540c" }, 
        { name: "WILLOW BY CRIZBUZZ ", uri: "https://a96aivottlinear-a.akamaihd.net/OTTB/iad-nitro/enc/wfdj3lglfg/out/v1/b2db8919b7f44ee38826dd1fa0c846d3/cenc.mpd", kid: "106c1cd8b773f4486335cd98f4d3b8d8", key: "167828189119ff2eda785eb4c0c7f35c" }
    ];

    function checkPin() {
        if (document.getElementById('pinInput').value === "2728") {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            init();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    async function init() {
        const video = document.getElementById('video');
        const container = document.getElementById('videoContainer');
        player = new shaka.Player(video);
        new shaka.ui.Overlay(player, container, video);

        // Auto-Reload Channel on Error (Instead of full page refresh)
        player.addEventListener('error', () => {
            console.log("Stream crashed, reloading channel...");
            loadChannel(currentChannelIndex);
        });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                request.uris[0] += (request.uris[0].includes('?') ? '&' : '?') + "__hdnea__=" + token;
                request.headers['User-Agent'] = "plaYtv/7.1.3 (Linux;Android 13)";
            }
        });

        const listDiv = document.getElementById('channelList');
        channels.forEach((ch, i) => {
            const btn = document.createElement('button');
            btn.className = 'channel-btn';
            btn.id = 'btn-' + i;
            btn.innerText = ch.name;
            btn.onclick = () => loadChannel(i);
            listDiv.appendChild(btn);
        });
        loadChannel(0);
    }

    async function loadChannel(index) {
        currentChannelIndex = index;
        const ch = channels[index];
        const statusEl = document.getElementById('currentStatus');
        document.getElementById('currentName').innerText = ch.name;
        statusEl.innerText = "Status: Loading...";
        
        document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + index).classList.add('active');

        player.configure({ drm: { clearKeys: { [ch.kid]: ch.key } } });

        try {
            await player.load(ch.uri);
            statusEl.innerText = "Status: Live";
            statusEl.style.color = "#00FF7F";
        } catch (e) {
            statusEl.innerText = "Status: Retrying...";
            setTimeout(() => loadChannel(index), 3000);
        }
    }
</script>
</body>
</html>
