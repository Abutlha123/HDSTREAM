<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JD Player - Lag Fix</title>
    
    <script src="https://content.jwplatform.com/libraries/SAHhwvZq.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #player { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <div id="player"></div>

    <script>
        const playerInstance = jwplayer("player").setup({
            playlist: [{
                title: "JD Live Stream",
                image: "https://i.ibb.co/Wvjr6mD/20240119-191942.png",
                sources: [{
                    file: "https://ta.bia-cf.live.pv-cdn.net/bom-nitro/live/clients/dash/enc/hp0lefwcem/out/v1/925bb83b4490417fa9c536dde0104939/cenc.mpd",
                    type: "dash",
                    drm: {
                        clearkey: {
                            keyId: "9854668c16b3ef7efe6facbf91fd8af2",
                            key: "fc899a5c275cbb1060d6d9d61cd52ecd"
                        }
                    }
                }]
            }],
            width: "100%",
            height: "100%",
            autostart: true,
            mute: false,
            volume: 100,
            controls: true,
            // --- Lag aur Buffering Fix Settings ---
            dashjsConfig: {
                debug: { logLimit: 1 },
                streaming: {
                    buffer: {
                        bufferTimeAtTopQuality: 30, // 30 seconds buffer load karega
                        stableBufferTime: 20,
                        initialBufferLevel: 10
                    },
                    lowLatencyEnabled: true,
                    abr: {
                        initialBitrate: { audio: -1, video: 500 } // Kam speed se start hoga taaki atke nahi
                    }
                }
            },
            // ---------------------------------------
            visualquality: true,
            stretching: "uniform"
        });

        // Error aane par auto-reload feature
        playerInstance.on('error', function(e) {
            console.log("Error detected, retrying in 3 seconds...");
            setTimeout(function() {
                playerInstance.load();
                playerInstance.play();
            }, 3000);
        });

        // Buffer alert handling
        playerInstance.on('buffer', function() {
            console.warn("Video buffering... optimization active.");
        });
    </script>
</body>
</html>
