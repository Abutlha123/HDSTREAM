<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SK STAR - Premium Live Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #050a14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --radius: 16px;
        }

        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #0f172a 0%, var(--bg) 100%);
            color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* Video Container Styling */
        .container { width: 100%; max-width: 1100px; padding: 15px; box-sizing: border-box; }
        .video-wrapper {
            position: relative; background: #000; border-radius: var(--radius);
            overflow: hidden; box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            border: 1px solid var(--border); aspect-ratio: 16 / 9; width: 100%;
        }

        /* UI Elements */
        .status-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 10px; }
        .dot { width: 8px; height: 8px; background: #444; border-radius: 50%; }
        .dot.active { background: #00ff88; box-shadow: 0 0 10px #00ff88; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .channel-info {
            padding: 20px; background: var(--card-bg); border-radius: var(--radius); 
            margin: 20px 0; border: 1px solid var(--border);
        }

        .refresh-btn {
            background: var(--accent); border: none; color: #000; 
            padding: 10px 20px; border-radius: 8px; font-weight: 600; 
            cursor: pointer; transition: 0.3s;
        }

        /* Grid Layout */
        .grid-header { margin: 25px 0 15px; font-weight: 800; border-left: 4px solid var(--accent); padding-left: 15px; align-self: flex-start; }
        .channel-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; width: 100%; padding-bottom: 50px;
        }
        .channel-card {
            background: var(--card-bg); border: 1px solid var(--border); padding: 15px;
            border-radius: var(--radius); text-align: center; cursor: pointer; transition: 0.3s;
        }
        .channel-card:hover { transform: translateY(-5px); border-color: var(--accent); background: rgba(0, 210, 255, 0.15); }
    </style>
</head>
<body onload="initApp()">

<div class="container">
    <div class="status-bar">
        <div id="statusDot" class="dot"></div>
        <span id="statusText">INITIALIZING...</span>
    </div>

    <div class="video-wrapper">
        <div id="video-container" data-shaka-player-container style="width:100%; height:100%;">
            <video id="video" data-shaka-player autoplay muted playsinline style="width:100%;height:100%"></video>
        </div>
    </div>

    <div class="channel-info">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <div>
                <h2 id="currentName" style="margin:0; font-size:1.2rem;">Select a Channel</h2>
                <p style="margin: 5px 0 0; font-size: 12px; color: #888;">GitHub Live Hosting Active</p>
            </div>
            <button class="refresh-btn" onclick="refreshStream()">🔄 REFRESH PLAYER</button>
        </div>
    </div>

    <div class="grid-header">PREMIUM CHANNELS</div>
    <div id="channelGrid" class="channel-grid"></div>
</div>

<script>
    const CHANNELS = [
        { name: "Star Sports 1 Hindi", url: "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd", kId: "400131994b445d8c8817202248760fda", key: "2d56cb6f07a75b9aff165d534ae2bfc4" },
        { name: "PAK VS NZ LIVE", url: "https://a201aivottlinear-a.akamaihd.net/OTTB/iad-nitro/live/clients/dash/enc/yiiftorhi8/out/v1/be0f7019b1c448f185520be36ff5c809/cenc.mpd", kId: "04ef2776a130e77f2e829d95bdc94d4b", key: "203f0b19e11497baf5910937486692d7" },
        { name: "Sports 18 1 HD", url: "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Sports18_1_HD_BTS/output/index.mpd", kId: "eb10fed8295930188989505972952862", key: "4c9475c889f89a9c5364811a0b388701" },
        { name: "Star Sports 2", url: "https://jiotvbpkmob.cdn.jio.com/bpk-tv/Star_Sports_2_BTS/output/index.mpd", kId: "eb10d8295930188989505872952862", key: "4c9475c889f89a9c5364811a0b388701" }
    ];

    let player, video, ui, currentChannel;
    const authCookie = "__hdnea__=st=1772241887~exp=1772328287~acl=/*~hmac=c2276b495783dbb09e00bbbf9f38c98f7d06d932a86c8364b74b848141627e13";

    async function initApp() {
        video = document.getElementById('video');
        const container = document.getElementById('video-container');
        shaka.polyfill.installAll();

        player = new shaka.Player(video);
        ui = new shaka.ui.Overlay(player, container, video);
        
        player.configure({
            streaming: { bufferingGoal: 30, rebufferingGoal: 2, lowLatencyMode: true },
            manifest: { retryParameters: { maxAttempts: 5 } }
        });

        // Request Filter for Cookies/Headers
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = "Mozilla/5.0 (Windows NT 10.0; Win64; x64)";
            if (request.uris[0].includes('jio') || request.uris[0].includes('akamaihd')) {
                const sep = request.uris[0].includes('?') ? '&' : '?';
                request.uris[0] += sep + authCookie;
            }
        });

        video.addEventListener('playing', () => updateStatus('LIVE - STABLE', true));
        video.addEventListener('waiting', () => updateStatus('BUFFERING...', false));
        player.addEventListener('error', (e) => updateStatus('STREAM ERROR', false));

        setupGrid();
        loadChannel(CHANNELS[0]);
    }

    async function loadChannel(ch) {
        currentChannel = ch;
        try {
            updateStatus('CONNECTING...', false);
            document.getElementById('currentName').innerText = ch.name;
            await player.configure({ drm: { clearKeys: { [ch.kId]: ch.key } } });
            await player.load(ch.url);
        } catch (e) {
            updateStatus('LOAD FAILED', false);
        }
    }

    function refreshStream() { if(currentChannel) loadChannel(currentChannel); }

    function updateStatus(text, active) {
        document.getElementById('statusText').innerText = text;
        document.getElementById('statusDot').className = active ? 'dot active' : 'dot';
    }

    function setupGrid() {
        const grid = document.getElementById('channelGrid');
        CHANNELS.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerText = ch.name;
            card.onclick = () => loadChannel(ch);
            grid.appendChild(card);
        });
    }
</script>
</body>
</html>
