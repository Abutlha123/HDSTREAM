<?php
// ==========================================
// 1. PROXY API LOGIC (Server-Side)
// ==========================================

// Agar request mein 'url' aata hai, toh yeh script Proxy ban jayegi
if (isset($_GET['url']) && !empty($_GET['url'])) {
    
    // CORS Headers
    header('Access-Control-Allow-Origin: *');
    header('Access-Control-Allow-Methods: GET, OPTIONS');
    header('Access-Control-Allow-Headers: *');

    if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') {
        exit;
    }

    $url = $_GET['url'];

    // cURL Setup
    $ch = curl_init();
    curl_setopt($ch, CURLOPT_URL, $url);
    curl_setopt($ch, CURLOPT_RETURNTRANSFER, true);
    curl_setopt($ch, CURLOPT_FOLLOWLOCATION, true);

    // Spoofed User-Agent
    curl_setopt($ch, CURLOPT_USERAGENT, 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36');
    curl_setopt($ch, CURLOPT_HTTPHEADER, [
        'Accept: */*'
    ]);

    $response = curl_exec($ch);
    $contentType = curl_getinfo($ch, CURLINFO_CONTENT_TYPE);
    curl_close($ch);

    // Wahi headers wapas bhejna jo original video file ke hain
    if ($contentType) {
        header("Content-Type: $contentType");
    }

    echo $response;
    exit; // YAHAN STOP KARNA ZAROORI HAI, taaki proxy request ke sath HTML na chala jaye
}

// ==========================================
// 2. HTML PLAYER LOGIC (Client-Side)
// ==========================================
// Agar 'url' nahi hai, toh normal player load hoga
?>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass User-Agent DRM Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.min.js"></script>
    
    <style>
        body { background-color: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .video-container { width: 90%; max-width: 800px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <h2>Live Stream (Proxied)</h2>
    <div class="video-container" data-shaka-player-container>
        <video id="video" data-shaka-player autoplay controls></video>
    </div>

    <script>
        // Aapki Original MPD URL
        const originalManifestUri = 'https://jiotvmblive.cdn.jio.com/bpk-tv/Disney_Channel_BTS/output/index.mpd';
        
        // Proxy API ki location ab yahi same file hai (?url= lagane se trigger hogi)
        const proxyApi = '?url=';

        async function initPlayer() {
            const video = document.getElementById('video');
            const player = new shaka.Player(video);

            // ClearKey DRM Keys Setup
            player.configure({
                drm: {
                    clearKeys: {
                        '5181d3e6698055578cedc5bfc86b3e56': '3dca7917d8cf9bb7095dc72b48bdcd3c'
                    }
                }
            });

            // Shaka Player ki har request ko isi file ke PHP proxy engine par bhej do
            player.getNetworkingEngine().registerRequestFilter(function(type, request) {
                const originalUrl = request.uris[0];
                if (!originalUrl.includes('?url=')) {
                    request.uris[0] = proxyApi + encodeURIComponent(originalUrl);
                }
            });

            try {
                // Manifest load karna
                const proxiedManifestUri = proxyApi + encodeURIComponent(originalManifestUri);
                await player.load(proxiedManifestUri);
                console.log('Video successfully loaded through internal Proxy!');
            } catch (e) {
                console.error('Error Code:', e.code, e);
                alert('Stream load nahi hui. Error console mein check karein.');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                initPlayer();
            } else {
                alert('Browser supported nahi hai.');
            }
        });
    </script>
</body>
</html>
