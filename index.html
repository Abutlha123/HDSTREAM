<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPD DRM Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        /* Screen ko poora black karne ke liye aur center karne ke liye */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
        }

        /* Video container ka size chota kar diya (jaisa image mein hai) */
        .video-container { 
            width: 90%;          /* Mobile screen ka 90% hissa lega */
            max-width: 640px;    /* Isse bada nahi hoga, ek compact box banega */
            background: #111;    /* Video load hone tak halka black box dikhega */
            border-radius: 8px;  /* Kinare thode round (optional) */
            overflow: hidden;
        }

        video { 
            width: 100%; 
            display: block;
            outline: none; 
        }
    </style>
</head>
<body>

<div class="video-container">
    <video id="video" controls autoplay></video>
</div>

<script>
    async function initPlayer() {
        const video = document.getElementById('video');
        const player = new shaka.Player(video);

        // Apni settings yaha update karein
        const manifestUri = 'https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/nwhydqiejb/out/v1/64918808c05b4176bcb0159a54346475/cenc.mpd';
        player.configure({
            drm: {
                clearKeys: {
                    'eeb93ab4a721511857d823b652939a92': '5a9b1a1272fb5bb2d08ddbc25fae0fc1'
                }
            }
        });

        try {
            await player.load(manifestUri);
        } catch (e) {
            console.error('Error:', e);
        }
    }
    document.addEventListener('DOMContentLoaded', initPlayer);
</script>

</body>
</html>
