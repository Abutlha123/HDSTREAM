<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JD Player - New Source</title>
    
    <script src="https://content.jwplatform.com/libraries/SAHhwvZq.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }

        .jwplayer.jw-flag-aspect-mode {
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <div id="player"></div>

    <script>
        const playerInstance = jwplayer("player").setup({
            playlist: [{
                title: "JD Live Stream - Updated",
                image: "https://i.ibb.co/Wvjr6mD/20240119-191942.png",
                sources: [{
                    // Naya updated MPD link
                    file: "https://ta.bia-cf.live.pv-cdn.net/bom-nitro/live/clients/dash/enc/hp0lefwcem/out/v1/925bb83b4490417fa9c536dde0104939/cenc.mpd",
                    type: "dash",
                    drm: {
                        clearkey: {
                            keyId: "9854668c16b3ef7efe6facbf91fd8af2",
                            key: "fc899a5c275cbb1060d6d9d61cd52ecd"
                        }
                    }
                }]
            }],
            width: "100%",
            height: "100%",
            aspectratio: "16:9",
            autostart: true,
            controls: true,
            stretching: "uniform",
            cast: {} 
        });

        // Error Handling
        playerInstance.on('setupError', function(e) {
            console.error("JW Player setup error: " + e.message);
        });

        playerInstance.on('error', function(e) {
            console.error("Playback error: " + e.message);
        });
    </script>
</body>
</html>
